<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>裏技・小技まとめ | LINEモンスターファーム徹底攻略</title>
  <meta name="description" content="LINEモンスターファームの裏技・小技・知っておくと得するテクニックをまとめました。育成効率アップ・ガチャ節約・バトル攻略のコツを解説。">
  <link rel="canonical" href="https://oginginlmftv2.github.io/line-monster-farm/tips.html">
  <link rel="stylesheet" href="style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7841397391542171" crossorigin="anonymous"></script>
  <style>
    .tip-card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 14px;
      position: relative;
    }
    .tip-card-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }
    .tip-label {
      display: inline-block;
      font-size: 11px;
      font-weight: bold;
      padding: 3px 9px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .label-ikusei { background: #fff3cd; color: #b8860b; }
    .label-gacha  { background: #e8f5e9; color: #388e3c; }
    .label-battle { background: #fde8e8; color: #c0392b; }
    .label-basic  { background: #e8eaf6; color: #3949ab; }
    .tip-title {
      font-size: 15px;
      font-weight: bold;
      color: #333;
      flex: 1;
    }
    .tip-edit-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 5px;
      color: #999;
      font-size: 12px;
      padding: 3px 8px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .tip-edit-btn:hover { border-color: #f0a500; color: #f0a500; }
    .tip-edit-btn.active { background: #f0a500; color: #fff; border-color: #f0a500; }
    .tip-body {
      font-size: 13px;
      line-height: 1.8;
      color: #555;
      white-space: pre-wrap;
    }
    .tip-body strong { color: #f0a500; }
    /* 編集UI */
    .tip-edit-area { display: flex; flex-direction: column; gap: 8px; }
    .tip-edit-row { display: flex; gap: 8px; align-items: center; }
    .tip-edit-row label { font-size: 12px; color: #888; width: 50px; flex-shrink: 0; }
    .tip-input-title {
      width: 100%;
      font-size: 14px;
      font-weight: bold;
      padding: 6px 10px;
      border: 1px solid #f0a500;
      border-radius: 6px;
      box-sizing: border-box;
      color: #333;
    }
    .tip-select-label {
      font-size: 13px;
      padding: 5px 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      color: #555;
      background: #fff;
    }
    .tip-textarea-body {
      width: 100%;
      min-height: 100px;
      font-size: 13px;
      line-height: 1.8;
      padding: 8px 10px;
      border: 1px solid #f0a500;
      border-radius: 6px;
      box-sizing: border-box;
      resize: vertical;
      color: #444;
    }
    .tip-edit-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .tip-save-btn {
      background: #f0a500;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
    }
    .tip-save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .tip-cancel-btn {
      background: #fff;
      color: #999;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    .tip-delete-btn {
      background: #fff;
      color: #e53e3e;
      border: 1px solid #e53e3e;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      margin-right: auto;
    }
    .tip-delete-btn:hover { background: #fff0f0; }
    /* 追加ボタン */
    .add-tip-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      background: #fff;
      border: 2px dashed #ddd;
      border-radius: 10px;
      color: #aaa;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 4px;
    }
    .add-tip-btn:hover { border-color: #f0a500; color: #f0a500; }
    .tips-loading { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }
    .tips-empty { text-align: center; padding: 40px; color: #bbb; font-style: italic; font-size: 14px; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">LINE<span>モンスターファーム</span>徹底攻略</a>
    <nav>
      <a href="index.html">トップ</a>
      <a href="monsters.html">モンスター一覧</a>
      <a href="assist.html">アシストカード一覧</a>
    </nav>
  </div>
</header>

<div class="container">
  <a href="index.html" style="display:inline-flex;align-items:center;gap:6px;color:#f0a500;text-decoration:none;font-size:14px;font-weight:bold;margin-bottom:20px;">← トップに戻る</a>
  <h1 class="page-title">💡 裏技・小技まとめ</h1>
  <p style="font-size:13px;color:#888;margin:-8px 0 20px;">知っておくと育成効率・ガチャ効率が大きく変わるテクニック集です。</p>

  <div class="section">
    <div id="tips-list">
      <div class="tips-loading">読み込み中...</div>
    </div>
    <button class="add-tip-btn" id="add-tip-btn" onclick="addTip()">＋ 項目を追加</button>
  </div>

  <p style="font-size:12px;color:#aaa;text-align:center;margin-top:8px;">
    情報は随時更新しています。コメント欄からの情報提供もお待ちしています。
  </p>
</div>

<footer>
  &copy; 2026 LINEモンスターファーム徹底攻略 ／ 非公式ファンサイト
  ／ <a href="privacy.html" style="color:#aaa;text-decoration:none;">プライバシーポリシー</a>
</footer>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  const EDIT_PASSWORD = 'mf2024';

  const firebaseConfig = {
    apiKey: "AIzaSyDQ7JiSAs8wozZPoh4esXnYjOPvexcMfKs",
    authDomain: "line-monster-farm.firebaseapp.com",
    projectId: "line-monster-farm",
    storageBucket: "line-monster-farm.firebasestorage.app",
    messagingSenderId: "952838892758",
    appId: "1:952838892758:web:3ef72e64bd567aefa22d77"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const LABEL_MAP = {
    ikusei: { text: '育成',   cls: 'label-ikusei' },
    gacha:  { text: 'ガチャ', cls: 'label-gacha'  },
    battle: { text: 'バトル', cls: 'label-battle' },
    basic:  { text: '基本',   cls: 'label-basic'  },
  };

  let tipsData = []; // { id, label, title, body, order }

  // ---- 読み込み ----

  async function loadTips() {
    const listEl = document.getElementById('tips-list');
    try {
      const snap = await db.collection('tips').orderBy('order', 'asc').get();
      tipsData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderTips();
    } catch (e) {
      listEl.innerHTML = '<div class="tips-empty">読み込みに失敗しました。</div>';
    }
  }

  function renderTips() {
    const listEl = document.getElementById('tips-list');
    if (tipsData.length === 0) {
      listEl.innerHTML = '<div class="tips-empty">まだ登録されていません。「＋ 項目を追加」から追加してください。</div>';
      return;
    }
    listEl.innerHTML = tipsData.map(tip => buildTipHtml(tip)).join('');
  }

  function buildTipHtml(tip) {
    const lbl = LABEL_MAP[tip.label] || LABEL_MAP.basic;
    const bodyHtml = escHtml(tip.body || '').replace(/\n/g, '<br>');
    return `
      <div class="tip-card" id="tip-${tip.id}">
        <div class="tip-card-header">
          <span class="tip-label ${lbl.cls}">${lbl.text}</span>
          <span class="tip-title">${escHtml(tip.title || '')}</span>
          <button class="tip-edit-btn" onclick="startEdit('${tip.id}')">✏️ 編集</button>
        </div>
        <div class="tip-body">${bodyHtml}</div>
      </div>`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ---- 編集 ----

  function startEdit(tipId) {
    const pw = prompt('編集パスワードを入力してください');
    if (pw !== EDIT_PASSWORD) {
      if (pw !== null) alert('パスワードが違います');
      return;
    }
    showEditForm(tipId);
  }

  function showEditForm(tipId) {
    const tip = tipsData.find(t => t.id === tipId);
    if (!tip) return;
    const el = document.getElementById('tip-' + tipId);
    const labelOptions = Object.entries(LABEL_MAP).map(([val, { text }]) =>
      `<option value="${val}" ${tip.label === val ? 'selected' : ''}>${text}</option>`
    ).join('');
    el.innerHTML = `
      <div class="tip-edit-area">
        <div class="tip-edit-row">
          <label>ラベル</label>
          <select class="tip-select-label" id="edit-label-${tipId}">${labelOptions}</select>
        </div>
        <div class="tip-edit-row">
          <label>タイトル</label>
          <input class="tip-input-title" id="edit-title-${tipId}" type="text" maxlength="80" value="${escHtml(tip.title || '')}">
        </div>
        <textarea class="tip-textarea-body" id="edit-body-${tipId}" maxlength="1000" placeholder="内容を入力...">${escHtml(tip.body || '')}</textarea>
        <div class="tip-edit-btns">
          <button class="tip-delete-btn" onclick="deleteTip('${tipId}')">🗑️ 削除</button>
          <button class="tip-cancel-btn" onclick="cancelEdit('${tipId}')">キャンセル</button>
          <button class="tip-save-btn" id="save-btn-${tipId}" onclick="saveTip('${tipId}')">💾 保存</button>
        </div>
      </div>`;
  }

  function cancelEdit(tipId) {
    const tip = tipsData.find(t => t.id === tipId);
    if (!tip) { loadTips(); return; }
    const el = document.getElementById('tip-' + tipId);
    el.outerHTML = buildTipHtml(tip);
  }

  async function saveTip(tipId) {
    const isNew = tipId === '__new__';
    const titleEl = document.getElementById('edit-title-' + tipId);
    const bodyEl  = document.getElementById('edit-body-'  + tipId);
    const labelEl = document.getElementById('edit-label-' + tipId);
    const saveBtn = document.getElementById('save-btn-'   + tipId);

    const title = titleEl.value.trim();
    const body  = bodyEl.value.trim();
    const label = labelEl.value;

    if (!title) { alert('タイトルを入力してください'); return; }

    saveBtn.textContent = '保存中...';
    saveBtn.disabled = true;

    try {
      if (isNew) {
        const maxOrder = tipsData.length > 0 ? Math.max(...tipsData.map(t => t.order || 0)) : 0;
        const ref = await db.collection('tips').add({ label, title, body, order: maxOrder + 1 });
        tipsData.push({ id: ref.id, label, title, body, order: maxOrder + 1 });
      } else {
        await db.collection('tips').doc(tipId).set({ label, title, body }, { merge: true });
        const t = tipsData.find(t => t.id === tipId);
        if (t) { t.label = label; t.title = title; t.body = body; }
      }
    } catch (e) {
      alert('保存に失敗しました: ' + e.message);
      saveBtn.textContent = '💾 保存';
      saveBtn.disabled = false;
      return;
    }

    renderTips();
  }

  async function deleteTip(tipId) {
    if (!confirm('この項目を削除しますか？')) return;
    try {
      await db.collection('tips').doc(tipId).delete();
      tipsData = tipsData.filter(t => t.id !== tipId);
      renderTips();
    } catch (e) {
      alert('削除に失敗しました: ' + e.message);
    }
  }

  // ---- 新規追加 ----

  function addTip() {
    const pw = prompt('編集パスワードを入力してください');
    if (pw !== EDIT_PASSWORD) {
      if (pw !== null) alert('パスワードが違います');
      return;
    }

    const listEl = document.getElementById('tips-list');
    const newEl = document.createElement('div');
    newEl.className = 'tip-card';
    newEl.id = 'tip-__new__';
    const labelOptions = Object.entries(LABEL_MAP).map(([val, { text }]) =>
      `<option value="${val}">${text}</option>`
    ).join('');
    newEl.innerHTML = `
      <div class="tip-edit-area">
        <div class="tip-edit-row">
          <label>ラベル</label>
          <select class="tip-select-label" id="edit-label-__new__">${labelOptions}</select>
        </div>
        <div class="tip-edit-row">
          <label>タイトル</label>
          <input class="tip-input-title" id="edit-title-__new__" type="text" maxlength="80" placeholder="タイトルを入力">
        </div>
        <textarea class="tip-textarea-body" id="edit-body-__new__" maxlength="1000" placeholder="内容を入力..."></textarea>
        <div class="tip-edit-btns">
          <button class="tip-cancel-btn" onclick="this.closest('.tip-card').remove()">キャンセル</button>
          <button class="tip-save-btn" id="save-btn-__new__" onclick="saveTip('__new__')">💾 保存</button>
        </div>
      </div>`;

    // 既存の空メッセージを消して追加
    const emptyEl = listEl.querySelector('.tips-empty');
    if (emptyEl) emptyEl.remove();
    listEl.appendChild(newEl);
    newEl.querySelector('input').focus();
    newEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  loadTips();
</script>

</body>
</html>
