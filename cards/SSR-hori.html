<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホリィ（SSR）| LINEモンスターファーム徹底攻略</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .card-detail {
      max-width: 800px;
      margin: 30px auto;
      padding: 0 20px;
    }
    .card-detail-top {
      background: #fff;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      gap: 30px;
      align-items: flex-start;
      margin-bottom: 24px;
    }
    .card-detail-img {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 12px;
      flex-shrink: 0;
    }
    .card-detail-info h1 {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .card-detail-info .rarity {
      font-size: 16px;
      padding: 4px 14px;
      margin-bottom: 16px;
      display: inline-block;
    }
    .card-detail-info p {
      color: #666;
      font-size: 14px;
      line-height: 1.7;
    }
    .detail-section {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    .detail-section h2 {
      font-size: 18px;
      font-weight: bold;
      border-left: 5px solid #f0a500;
      padding-left: 12px;
      margin-bottom: 16px;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #f0a500;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="../index.html" class="logo">LINE<span>モンスターファーム</span>徹底攻略</a>
    <nav>
      <a href="../index.html">トップ</a>
      <a href="../monsters.html">モンスター一覧</a>
      <a href="../assist.html" class="active">アシストカード一覧</a>
    </nav>
  </div>
</header>

<div class="card-detail">
  <a class="back-link" href="../assist.html">← アシストカード一覧に戻る</a>

  <div class="card-detail-top">
    <img class="card-detail-img" src="../assist-cards/SSR-hori.jpg" alt="ホリィ">
    <div class="card-detail-info">
      <h1>ホリィ</h1>
      <span class="rarity rarity-SSR">SSR</span>
      <p>（説明文・能力・入手方法などをここに追加予定）</p>
    </div>
  </div>

  <div class="detail-section">
    <h2>ステータス・スキル</h2>
    <p>（データ準備中）</p>
  </div>

  <div class="detail-section">
    <h2>入手方法</h2>
    <p>（データ準備中）</p>
  </div>

  <div class="detail-section">
    <h2>評価・使い方</h2>
    <p>（データ準備中）</p>
  </div>
</div>

<footer>
  LINEモンスターファーム徹底攻略 &copy; 2026 ／ 非公式ファンサイト
</footer>

</body>
</html>
