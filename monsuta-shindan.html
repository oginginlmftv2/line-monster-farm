    .choice-btn:hover   { background: #fff8e1; border-color: #f0a500; }

<script>
/* ===== Firebase ===== */
const firebaseConfig = {
  apiKey: "AIzaSyDQ7JiSAs8wozZPoh4esXnYjOPvexcMfKs",
  authDomain: "line-monster-farm.firebaseapp.com",
  projectId: "line-monster-farm",
  storageBucket: "line-monster-farm.firebasestorage.app",
  messagingSenderId: "952838892758",
  appId: "1:952838892758:web:3ef72e64bd567aefa22d77"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let assignments = {};
db.collection('monsterImages').doc('assignments').get()
  .then(doc => { if (doc.exists) assignments = doc.data(); })
  .catch(() => {});

/* ===== 質問データ (labelOffset: 選択肢ラベルのASCIIオフセット) ===== */
const questions = [
  {
    text: '育てるなら？',
    labelOffset: 0,  // A B C D
    choices: [
      { text: 'ふわふわでかわいすぎるヤツ',           axis: 'ai'  },
      { text: '雰囲気がかっこよすぎるヤツ',           axis: 'ken' },
      { text: 'どう見ても強そうなヤツ',               axis: 'sen' },
      { text: 'こんなヤツ好きなの自分だけだろなヤツ', axis: null  },
    ]
  },
  {
    text: '修行で覚える技は',
    labelOffset: 4,  // E F G H
    choices: [
      { text: '小さな技からコツコツと',       axis: 'iku' },
      { text: '一撃必殺に全てをかける',       axis: 'sen' },
      { text: 'ガッツダウンが一番おもしろい', axis: 'ken' },
      { text: 'とにかくランクが高い技',       axis: null  },
    ]
  },
  {
    text: '失敗率10％か…',
    labelOffset: 8,  // I J K L
    choices: [
      { text: '10％は嫌だな。アイテムを使おう',                               axis: 'ai'  },
      { text: '10％なら恐る恐る勝負だ',                                       axis: 'sen' },
      { text: '10％は四捨五入したら0％だ',                                    axis: 'ken' },
      { text: 'そんなこともあろうかとさっき失敗しておいたから今回は大丈夫',   axis: null  },
    ]
  },
  {
    text: 'トレーニング失敗しちゃったのか',
    labelOffset: 12,  // M N O P
    choices: [
      { text: 'ドンマイドンマイ！次頑張れば大丈夫！', axis: 'ai'  },
      { text: '二度と失敗しないように対策案を出して', axis: 'iku' },
      { text: '何度失敗しても可愛いのでモーマンタイ', axis: 'ai'  },
      { text: '悪即斬',                               axis: null  },
    ]
  },
  {
    text: '育成完了！',
    labelOffset: 16,  // Q R S T
    choices: [
      { text: 'どんな結果でも可愛いからずっとうちの子だ', axis: 'ai'  },
      { text: 'バトルに強いモンスターができたぞ',         axis: 'sen' },
      { text: '総合力が高くて最高だ',                     axis: 'iku' },
      { text: 'ナゲセンと交換？よし、荷台に乗せてくれ',  axis: null  },
    ]
  },
];

/* ===== タイプデータ ===== */
const typeData = {
  sen: { eyecatch: '⚔️', badge: '勝負師タイプ', desc: '勝利への執念が人一倍強く、大会やランキングで結果を出すことに燃えているタイプ。その闘争心に応えるだけの力を秘めたモンスターがあなたに合っています。' },
  iku: { eyecatch: '📈', badge: '研究家タイプ', desc: '育成の数値を徹底的に追求するコアなブリーダータイプ。秘伝・忠誠度・トレーニング効率を細かく管理するあなたには、育成のポテンシャルが高いモンスターが合っています。' },
  ken: { eyecatch: '🔍', badge: '分析家タイプ', desc: '攻略法や血統の相性を研究することが楽しいタイプ。誰よりも深くゲームを理解しようとするあなたには、個性豊かで奥が深いモンスターが合っています。' },
  ai:  { eyecatch: '🌸', badge: '愛情育成タイプ', desc: 'モンスターへの愛情を何より大切にするタイプ。数値や勝敗よりも、モンスターとの時間そのものに価値を見いだすあなたには、愛着の湧くモンスターが合っています。' },
  mix:      { eyecatch: '⭐', badge: 'バランスタイプ', desc: 'バトル・育成・研究・愛情をバランスよく持ち合わせたオールラウンドタイプ。どんな状況でも柔軟に対応できるあなたには、可能性に満ちたモンスターが合っています。' },
  kawazumo: { eyecatch: '🐸', badge: '荷台行き判定タイプ', desc: '独自の価値観とルールで生きる超個性派ブリーダー。モンスターへの愛はその独特の形で表現されています。カワズモーもそう思っているはず…たぶん。' },
};

/* ===== オーラ色 ===== */
const auraStyle = {
  '黒': { bg: '#4a5568', color: '#fff' },
  '赤': { bg: '#fc8181', color: '#fff' },
  '青': { bg: '#63b3ed', color: '#fff' },
  '白': { bg: '#e2e8f0', color: '#4a5568' },
  '緑': { bg: '#68d391', color: '#fff' },
  '黄': { bg: '#f6e05e', color: '#744210' },
};

/* ===== モン種族emoji ===== */
const monEmoji = {
  '幻霊': '👻', '創造': '✨', '獣': '🐾', '怪物': '👾', '魔族': '⚡', '無機': '⚙️',
};

/* ===== 状態 ===== */
let answers = [];

/* ===== 開始 ===== */
function startQuiz() {
  answers = [];
  document.getElementById('intro-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  buildDots();
  showQuestion();
}

function buildDots() {
  const wrap = document.getElementById('progress-dots');
  wrap.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const d = document.createElement('div');
    d.className = 'progress-dot' + (i === 0 ? ' current' : '');
    d.id = 'dot-' + i;
    wrap.appendChild(d);
  }
}

function showQuestion() {
  const qi = answers.length;
  const q  = questions[qi];
  const pct = (qi / 5) * 100;

  document.getElementById('q-num-label').textContent = qi + 1;
  document.getElementById('q-pct-label').textContent = Math.round(pct) + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-num-badge').textContent = 'Q' + (qi + 1);
  document.getElementById('q-text').textContent = q.text;

  for (let i = 0; i < 5; i++) {
    const dot = document.getElementById('dot-' + i);
    if (!dot) continue;
    dot.className = 'progress-dot' + (i < qi ? ' done' : i === qi ? ' current' : '');
  }

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c, i) => {
    const label = String.fromCharCode(65 + q.labelOffset + i);
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-label">${label}</span><span>${c.text}</span>`;
    btn.onclick = () => answer(i, btn);
    choicesEl.appendChild(btn);
  });

  const card = document.getElementById('q-card');
  card.classList.remove('fade-in');
  void card.offsetWidth;
  card.classList.add('fade-in');
}

function answer(idx, btn) {
  btn.classList.add('selected');
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  answers.push(idx);

  setTimeout(() => {
    if (answers.length < 5) {
      showQuestion();
    } else {
      showResult();
    }
  }, 280);
}

/* ===== 結果計算 ===== */
function showResult() {
  // 進捗を100%に
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('q-pct-label').textContent = '100%';
  for (let i = 0; i < 5; i++) {
    const dot = document.getElementById('dot-' + i);
    if (dot) dot.className = 'progress-dot done';
  }

  setTimeout(() => {
    document.getElementById('quiz-screen').style.display = 'none';

    // パーソナリティスコア（axis:nullは無視）
    const scores = { sen: 0, iku: 0, ken: 0, ai: 0 };
    answers.forEach((a, qi) => {
      const axis = questions[qi].choices[a].axis;
      if (axis) scores[axis]++;
    });

    // L/P/T（Q3〜Q5の選択肢index=3）を1つでも選んでいたらカワズモー種
    const isKawazumo = answers[2] === 3 || answers[3] === 3 || answers[4] === 3;
    let monster, monIdx, typeKey;
    const code = answers[0]*256 + answers[1]*64 + answers[2]*16 + answers[3]*4 + answers[4];

    if (isKawazumo) {
      const kawazumoList = monstersData
        .map((m, i) => ({ m, i }))
        .filter(({ m }) => m.mainMon === 'カワズモー');
      const pick = Math.floor(code * kawazumoList.length / 1024);
      monster = kawazumoList[pick].m;
      monIdx  = kawazumoList[pick].i;
      typeKey = 'kawazumo';
    } else {
      monIdx  = Math.floor(code * monstersData.length / 1024);
      monster = monstersData[monIdx];
      const maxScore = Math.max(...Object.values(scores));
      const tops = Object.keys(scores).filter(k => scores[k] === maxScore);
      typeKey = tops.length === 1 ? tops[0] : 'mix';
    }
    const type = typeData[typeKey];

    // タイプ表示
    document.getElementById('result-type-eyecatch').textContent = type.eyecatch;
    document.getElementById('result-type-badge').textContent    = type.badge;
    document.getElementById('result-type-desc').textContent     = type.desc;

    // モンスター画像
    const imgWrap = document.getElementById('monster-img-wrap');
    const validLocalImg = (monster.localImg && monster.localImg.startsWith('S_')) ? monster.localImg : null;
    const localFile = validLocalImg || (assignments && assignments[monster.name]) || null;
    if (localFile) {
      imgWrap.innerHTML = `<img src="monster/${localFile}" alt="${monster.name}" onerror="this.style.display='none'">`;
    } else {
      imgWrap.innerHTML = `<span class="monster-img-placeholder">${monEmoji[monster.mon] || '🥚'}</span>`;
    }

    // モンスター名・タイプ
    document.getElementById('monster-name').textContent = monster.name;

    const aura = monster.aura || '';
    const auraBadge = document.getElementById('aura-badge');
    const aStyle = auraStyle[aura] || { bg: '#eee', color: '#333' };
    auraBadge.textContent = aura ? aura + 'オーラ' : '';
    auraBadge.style.background = aStyle.bg;
    auraBadge.style.color      = aStyle.color;

    const emoji = monEmoji[monster.mon] || '';
    document.getElementById('monster-types').textContent =
      `${emoji} ${monster.mon || ''}　${monster.mainMon || ''} × ${monster.subMon || ''}`;

    // スコアバー
    ['sen','iku','ken','ai'].forEach(k => {
      document.getElementById('bar-' + k).style.width = (scores[k] / 5 * 100) + '%';
      document.getElementById('num-' + k).textContent  = scores[k];
    });

    // 詳細リンク
    document.getElementById('detail-btn').href = `monsters/monster.html?id=${monIdx}`;

    // 表示
    document.getElementById('result-screen').style.display = 'block';
  }, 400);
}

function resetQuiz() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('intro-screen').style.display  = 'block';
}
</script>

</body>
</html>
