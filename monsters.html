<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>モンスター一覧 | LINEモンスターファーム徹底攻略</title>
  <meta name="description" content="LINEモンスターファーム全モンスター一覧。種族・オーラ色別にモンスターを絞り込んで検索できます。">
  <link rel="canonical" href="https://oginginlmftv2.github.io/line-monster-farm/monsters.html">
  <link rel="stylesheet" href="style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7841397391542171" crossorigin="anonymous"></script>
  <style>
    /* モンスターグリッド */
    .monster-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }
    @media (max-width: 600px) {
      .monster-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 8px;
      }
    }

    /* モンスターカード */
    .monster-card {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
      text-align: center;
      cursor: default;
    }
    .monster-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.14);
    }

    .monster-img-wrap {
      position: relative;
      width: 100%;
      padding-top: 100%;
      background: #eee;
      overflow: hidden;
    }
    .monster-img-wrap img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 限定バッジ (画像右上) */
    .badge-limited {
      position: absolute;
      top: 4px; right: 4px;
      background: linear-gradient(135deg, #e11d48, #f59e0b);
      color: #fff;
      font-size: 10px;
      font-weight: bold;
      padding: 2px 5px;
      border-radius: 4px;
      line-height: 1.3;
      white-space: nowrap;
      z-index: 1;
    }

    .monster-info {
      padding: 7px 6px 8px;
    }

    /* オーラバッジ (カラードット + テキスト) */
    .aura-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .aura-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .aura-赤  .aura-dot { background: #e53e3e; }
    .aura-青  .aura-dot { background: #3182ce; }
    .aura-黄  .aura-dot { background: #d69e2e; }
    .aura-黒  .aura-dot { background: #4a4a4a; }
    .aura-白  .aura-dot { background: #a0aec0; border: 1px solid #ccc; }
    .aura-緑  .aura-dot { background: #38a169; }
    .aura-赤  { color: #c53030; }
    .aura-青  { color: #2b6cb0; }
    .aura-黄  { color: #b7791f; }
    .aura-黒  { color: #2d2d2d; }
    .aura-白  { color: #718096; }
    .aura-緑  { color: #276749; }

    .monster-name {
      font-size: 12px;
      font-weight: bold;
      line-height: 1.3;
      word-break: break-all;
    }

    /* フィルターボタン: オーラ色 */
    .filter-btn.aura-赤  { border-color: #e53e3e; color: #e53e3e; }
    .filter-btn.aura-赤:hover, .filter-btn.aura-赤.active  { background: #e53e3e; color: #fff; border-color: #e53e3e; }
    .filter-btn.aura-青  { border-color: #3182ce; color: #3182ce; }
    .filter-btn.aura-青:hover, .filter-btn.aura-青.active  { background: #3182ce; color: #fff; border-color: #3182ce; }
    .filter-btn.aura-黄  { border-color: #d69e2e; color: #b7791f; }
    .filter-btn.aura-黄:hover, .filter-btn.aura-黄.active  { background: #d69e2e; color: #fff; border-color: #d69e2e; }
    .filter-btn.aura-黒  { border-color: #4a4a4a; color: #4a4a4a; }
    .filter-btn.aura-黒:hover, .filter-btn.aura-黒.active  { background: #4a4a4a; color: #fff; border-color: #4a4a4a; }
    .filter-btn.aura-白  { border-color: #718096; color: #718096; }
    .filter-btn.aura-白:hover, .filter-btn.aura-白.active  { background: #718096; color: #fff; border-color: #718096; }
    .filter-btn.aura-緑  { border-color: #38a169; color: #276749; }
    .filter-btn.aura-緑:hover, .filter-btn.aura-緑.active  { background: #38a169; color: #fff; border-color: #38a169; }
    .filter-btn.limited { border-color: #e11d48; color: #e11d48; }
    .filter-btn.limited:hover, .filter-btn.limited.active { background: #e11d48; color: #fff; border-color: #e11d48; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">LINE<span>モンスターファーム</span>徹底攻略</a>
    <nav>
      <a href="index.html">トップ</a>
      <a href="monsters.html" class="active">モンスター一覧</a>
      <a href="assist.html">アシストカード一覧</a>
    </nav>
  </div>
</header>

<div class="container">
  <h1 class="page-title">モンスター一覧</h1>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn aura-赤"  data-filter="赤">赤</button>
    <button class="filter-btn aura-青"  data-filter="青">青</button>
    <button class="filter-btn aura-黄"  data-filter="黄">黄</button>
    <button class="filter-btn aura-黒"  data-filter="黒">黒</button>
    <button class="filter-btn aura-白"  data-filter="白">白</button>
    <button class="filter-btn aura-緑"  data-filter="緑">緑</button>
    <button class="filter-btn limited"  data-filter="limited">限定のみ</button>
  </div>

  <div class="filter-bar" id="monFilterBar" style="margin-top:8px;">
    <button class="filter-btn active" data-mon="all">すべて</button>
    <button class="filter-btn" data-mon="獣">獣</button>
    <button class="filter-btn" data-mon="創造">創造</button>
    <button class="filter-btn" data-mon="魔族">魔族</button>
    <button class="filter-btn" data-mon="幻霊">幻霊</button>
    <button class="filter-btn" data-mon="怪物">怪物</button>
    <button class="filter-btn" data-mon="無機">無機</button>
  </div>

  <div class="monster-grid" id="monsterGrid">
    <!-- JS で生成 -->
  </div>
</div>

<footer>
  LINEモンスターファーム徹底攻略 &copy; 2026 ／ 非公式ファンサイト
  ／ <a href="privacy.html" style="color:#aaa;text-decoration:none;">プライバシーポリシー</a>
</footer>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="monsters-data.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDQ7JiSAs8wozZPoh4esXnYjOPvexcMfKs",
  authDomain: "line-monster-farm.firebaseapp.com",
  projectId: "line-monster-farm",
  storageBucket: "line-monster-farm.firebasestorage.app",
  messagingSenderId: "952838892758",
  appId: "1:952838892758:web:3ef72e64bd567aefa22d77"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ---- GameWith 画像 URL ---- */
function gwUrl(gwImg) {
  return `https://img.gamewith.jp/article_tools/monsterfarm-line/gacha/Lmonfar_monster_${gwImg}.png`;
}

/* ---- グリッド描画 ---- */
function buildGrid(assignments) {
  const grid = document.getElementById('monsterGrid');
  grid.innerHTML = '';

  monstersData.forEach((m, idx) => {
    const validLocalImg = (m.localImg && m.localImg.startsWith('S__')) ? m.localImg : null;
    const localFile = validLocalImg || (assignments && assignments[m.name]) || null;
    const imgSrc = localFile ? `monster/${localFile}` : gwUrl(m.gwImg);

    const card = document.createElement('a');
    card.className = 'monster-card';
    card.href = `monsters/monster.html?id=${idx}`;
    card.dataset.aura = m.aura;
    card.dataset.limited = m.limited ? '1' : '0';
    card.dataset.mon = m.mon || '';
    card.style.textDecoration = 'none';
    card.style.color = 'inherit';
    card.style.display = 'block';

    card.innerHTML = `
      <div class="monster-img-wrap">
        <img src="${imgSrc}" alt="${m.name}"
             onerror="this.src='${gwUrl(m.gwImg)}'">
        ${m.limited ? `<span class="badge-limited">限定</span>` : ''}
      </div>
      <div class="monster-info">
        <div class="aura-badge aura-${m.aura}">
          <span class="aura-dot"></span>${m.aura}
        </div>
        <div class="monster-name">${m.name}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

/* ---- フィルター ---- */
let currentFilter = 'all';
let currentMon = 'all';

document.getElementById('filterBar').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  this.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  applyFilter();
});

document.getElementById('monFilterBar').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  this.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentMon = btn.dataset.mon;
  applyFilter();
});

function applyFilter() {
  document.querySelectorAll('.monster-card').forEach(card => {
    // オーラ・限定フィルター
    let auraOk = false;
    if (currentFilter === 'all') {
      auraOk = true;
    } else if (currentFilter === 'limited') {
      auraOk = card.dataset.limited === '1';
    } else {
      auraOk = card.dataset.aura === currentFilter;
    }
    // モン類フィルター
    const monOk = currentMon === 'all' || card.dataset.mon === currentMon;

    card.style.display = (auraOk && monOk) ? '' : 'none';
  });
}

/* ---- 起動 ---- */
db.collection('monsterImages').doc('assignments').get()
  .then(doc => buildGrid(doc.exists ? doc.data() : {}))
  .catch(() => buildGrid({}));
</script>

</body>
</html>
