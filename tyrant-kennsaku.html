        </select>
      </div>
      <div>
        <div class="fixed-col-label">父祖父</div>

        </select>
      </div>
      <div>
        <div class="fixed-col-label">父祖母</div>
        <select id="sel_fm" class="slot-select" onchange="highlightFixed(this)">
          <option value="">選択してください</option>
        </select>
      </div>
    </div>

    <div class="parent-row-label">母親側</div>
    <div class="fixed-grid">
      <div>

        </select>

      <div>

          <option value="">選択してください</option>
        </select>
      </div>
    </div>

          <button class="cnt-btn" onclick="adjustBonus('s2',-1)">−</button>
          <span class="cnt-val" id="val-s2">0</span>
          <button class="cnt-btn" onclick="adjustBonus('s2',1)">＋</button>

<script src="data.js"></script>
<script>
  const slotIds = ['sel_f', 'sel_ff', 'sel_fm', 'sel_m', 'sel_mf', 'sel_mm'];

  MONSTER_NAMES.forEach((name, i) => {
    slotIds.forEach(id => {
      const s = document.getElementById(id);
      const o = document.createElement('option');
      o.value = i;
      o.textContent = name;
      s.appendChild(o);
    });
  });

  const bonusState = { s3: 0, s2: 0, noble: 0 };
  const bonusMax = { s3: 20, s2: 20, noble: 36 };

  function adjustBonus(key, delta) {
    bonusState[key] = Math.max(0, Math.min(bonusMax[key], bonusState[key] + delta));
    document.getElementById('val-' + key).textContent = bonusState[key];
    const noteEl = document.getElementById('note-' + key);
    if (key === 's3') {
      const v = bonusState.s3 * 12.5;
      noteEl.textContent = v > 0 ? `+${v}` : '';
    } else if (key === 's2') {
      const v = bonusState.s2 * 5;
      noteEl.textContent = v > 0 ? `+${v}` : '';
    } else if (key === 'noble') {
      const v = bonusState.noble > 0 ? (DEFAULT_NOBLE_DATA[bonusState.noble] || 0) : 0;
      noteEl.textContent = v > 0 ? `+${v}` : '';
    }
  }

  function getBonus() {
    const nobleVal = bonusState.noble > 0 ? (DEFAULT_NOBLE_DATA[bonusState.noble] || 0) : 0;
    return bonusState.s3 * 12.5 + bonusState.s2 * 5 + nobleVal;
  }

  function highlightFixed(sel) {
    sel.classList.toggle('fixed', sel.value !== '');
  }

  function resetSlots() {
    slotIds.forEach(id => {
      const s = document.getElementById(id);
      s.value = '';
      s.classList.remove('fixed');
    });
  }

  function getComb(child, parent) {
    if (child === null || parent === null || child < 0 || parent < 0) return 0;
    return (COMPATIBILITY_MATRIX[child] && COMPATIBILITY_MATRIX[child][parent]) || 0;
  }

  function getSymbol(score) {
    if (score >= 660) return '👑';
    if (score >= 614) return '☆';
    if (score >= 490) return '◎';
    if (score >= 374) return '○';
    if (score >= 255) return '△';
    return '×';
  }

  function doTyrantSearch() {
    const resultsEl = document.getElementById('results');

    const vals = {};
    const slotNames = ['f', 'ff', 'fm', 'm', 'mf', 'mm'];
    for (const name of slotNames) {
      const v = document.getElementById('sel_' + name).value;
      if (v === '') {
        resultsEl.innerHTML = '<div class="no-result">全枠を選択してください</div>';
        return;
      }
      vals[name] = parseInt(v);
    }

    const { f, ff, fm, m, mf, mm } = vals;
    const bonus = getBonus();
    const parentComb = getComb(f, m);

    const results = MONSTER_NAMES.map((name, childId) => {
      const pScore = getComb(childId, f)
        + Math.min(getComb(f, ff), getComb(childId, ff))
        + Math.min(getComb(f, fm), getComb(childId, fm));
      const mScore = getComb(childId, m)
        + Math.min(getComb(m, mf), getComb(childId, mf))
        + Math.min(getComb(m, mm), getComb(childId, mm));
      const total = pScore + mScore + parentComb + 224 + bonus;
      return { name, score: total };
    });

    results.sort((a, b) => b.score - a.score);

    const bonusText = bonus > 0 ? `　ボーナス+${bonus}込み` : '';
    let html = `<div class="result-label">育成血統ランキング（全33血統）${bonusText}</div><div class="result-list">`;
    results.forEach((item, idx) => {
      const rank = idx + 1;
      const rankClass = rank === 1 ? 'r1' : rank === 2 ? 'r2' : rank === 3 ? 'r3' : '';
      const score = Math.round(item.score * 10) / 10;
      const symbol = getSymbol(score);
      html += `
        <div class="result-row">
          <span class="result-rank ${rankClass}">${rank}位</span>
          <span class="result-name">${item.name}</span>
          <span class="result-score">${score}</span>
          <span class="result-symbol">${symbol}</span>
        </div>`;
    });
    html += '</div>';
    resultsEl.innerHTML = html;
  }
</script>

</body>
