function exp(h, field) {
  const v = h[field];
  return v === '=' ? h.e1 : v;
}
function nb(s) { return s.replace(/\n/g,'<br>'); }

let currentSort = 'cat';
let currentSearch = '';

function matches(h, q) {
  return [h.name, h.e1, exp(h,'e2'), exp(h,'e3'), h.cond, h.note||'', CATS[h.cat]].join(' ').toLowerCase().includes(q);
}

function render() {
  const body = document.getElementById('htBody');
  const q = currentSearch.toLowerCase();
  let list = H.filter(h => !q || matches(h, q));

  if (currentSort === 'yomi') {
    list = [...list].sort((a,b) => a.yomi.localeCompare(b.yomi, 'ja'));
  } else if (currentSort === 'priority') {
    list = [...list].sort((a,b) => a.pri - b.pri);
  } else {
    list = [...list].sort((a,b) => a.cat !== b.cat ? a.cat - b.cat : (a.priCat??a.pri) - (b.priCat??b.pri));
  }

  const displayList = currentSort === 'priority' ? list : list.filter(h => !h.sep);
  document.getElementById('countLabel').textContent = displayList.filter(h => !h.sep).length + '件 表示中';

  let html = '';
  let lastCat = -1;
  for (const h of displayList) {
    if (h.sep) {
      html += `<tr><td colspan="5" style="text-align:center;color:#aaa;font-size:12px;padding:6px;border-bottom:2px dashed #ddd;">── ${h.text} ──</td></tr>`;
      continue;
    }
    if (currentSort === 'cat' && h.cat !== lastCat) {
      html += `<tr class="cat-hd"><td colspan="5">▌ ${CATS[h.cat]}</td></tr>`;
      lastCat = h.cat;
    }
    const e2 = exp(h,'e2'), e3 = exp(h,'e3');
    html += `<tr>
      <td>${h.name}${h.note ? `<div class="entry-note">${h.note}</div>` : ''}</td>
      <td>${nb(h.e1)}</td>
      <td>${nb(e2)}</td>
      <td>${nb(e3)}</td>
      <td class="cond-cell">${h.cond}</td>
    </tr>`;
  }
  body.innerHTML = html;
}

document.querySelector('.sort-bar').addEventListener('click', e => {
  const btn = e.target.closest('.sort-btn');
  if (!btn) return;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSort = btn.dataset.sort;
  render();
});

document.getElementById('searchBox').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});

render();
</script>
