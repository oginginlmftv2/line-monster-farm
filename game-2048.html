<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="S__94175247.jpg">
  <link rel="apple-touch-icon" href="S__94175247.jpg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>モンスター進化2048 | LINEモンスターファーム徹底攻略</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .game-wrapper {
      max-width: 460px;
      margin: 0 auto;
      padding: 16px 16px 32px;
    }
    .game-title {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      color: #1a1a2e;
      margin-bottom: 16px;
    }
    .game-title span { color: #f0a500; }

    /* スタート画面 */
    .start-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .rules {
      font-size: 13px;
      color: #555;
      line-height: 1.9;
      background: #f9f9f9;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }
    .rules strong { color: #1a1a2e; }
    .evo-chain {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
      font-size: 12px;
      color: #444;
    }
    .evo-chip {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 2px 6px;
      white-space: nowrap;
    }
    .name-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .name-input {
      flex: 1;
      padding: 10px 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
    }
    .name-input:focus { outline: none; border-color: #f0a500; }
    .name-input.err { border-color: #e53935; }
    .start-btn {
      padding: 10px 20px;
      background: #f0a500;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .start-btn:hover { background: #d4920a; }

    /* タイマーバー */
    .timer-bar-wrap {
      height: 8px;
      background: #ddd;
      border-radius: 4px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .timer-bar {
      height: 100%;
      width: 100%;
      background: #4CAF50;
      border-radius: 4px;
      transition: width 1s linear, background 0.4s;
    }

    /* ゲームヘッダー */
    .game-hd {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .info-box {
      flex: 1;
      background: #1a1a2e;
      border-radius: 8px;
      padding: 8px 10px;
      text-align: center;
    }
    .info-label { font-size: 11px; color: #aaa; }
    .info-val {
      font-size: 26px;
      font-weight: bold;
      color: #f0a500;
      line-height: 1.2;
    }
    #timerVal { color: #4CAF50; }
    #timerVal.warn { color: #f0a500; }
    #timerVal.danger { color: #e53935; }

    /* グリッド */
    .grid-wrap {
      background: #bbada0;
      border-radius: 10px;
      padding: 8px;
      touch-action: none;
      user-select: none;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .cell {
      aspect-ratio: 1;
      background: rgba(238,228,218,0.35);
      border-radius: 6px;
    }
    .tile {
      aspect-ratio: 1;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      text-align: center;
      padding: 4px;
      line-height: 1.2;
      word-break: break-all;
      animation: tpop 0.12s ease;
    }
    @keyframes tpop {
      from { transform: scale(0.8); opacity: 0.5; }
      to   { transform: scale(1);   opacity: 1; }
    }
    /* フォントサイズはタイル価値で変える */
    .tile { font-size: 15px; }
    .tile.sm { font-size: 12px; }
    .tile.xs { font-size: 10px; }

    /* タイル色 */
    .t2    { background: #eee4da; color: #776e65; }
    .t4    { background: #ffe0b2; color: #5d4037; }
    .t8    { background: #ffcc80; color: #4e342e; }
    .t16   { background: #ffb74d; color: #fff; }
    .t32   { background: #ffa726; color: #fff; }
    .t64   { background: #fb8c00; color: #fff; }
    .t128  { background: #e91e8c; color: #fff; }
    .t256  { background: #8e24aa; color: #fff; }
    .t512  { background: #3949ab; color: #fff; }
    .t1024 { background: #00897b; color: #fff; }
    .t2048 { background: #9e9d24; color: #fff; }
    .t4096 { background: #e53935; color: #fff; }

    .how-to {
      text-align: center;
      font-size: 12px;
      color: #888;
      margin-top: 7px;
    }

    /* 終了画面 */
    .end-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      text-align: center;
    }
    .end-title { font-size: 20px; font-weight: bold; }
    .end-label { font-size: 13px; color: #888; margin: 6px 0 2px; }
    .end-score {
      font-size: 54px;
      font-weight: bold;
      color: #f0a500;
      line-height: 1;
      margin-bottom: 4px;
    }
    .best-note { font-size: 13px; color: #f0a500; font-weight: bold; min-height: 18px; }
    .submit-msg { font-size: 13px; color: #888; margin: 8px 0 4px; }
    .retry-btn {
      display: inline-block;
      padding: 12px 36px;
      background: #f0a500;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      margin-top: 16px;
      transition: background 0.15s;
    }
    .retry-btn:hover { background: #d4920a; }

    /* ランキングテーブル */
    .rank-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin: 12px 0 4px;
    }
    .rank-table th {
      background: #1a1a2e;
      color: #fff;
      padding: 8px 6px;
      font-size: 13px;
    }
    .rank-table td {
      padding: 8px 6px;
      border-bottom: 1px solid #eee;
    }
    .rank-table tr.me { background: #fff8e1; font-weight: bold; }
    .rank-sec-title { font-size: 15px; font-weight: bold; margin: 16px 0 4px; }

    .pre-ranking { margin-top: 20px; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">LINE<span>モンスターファーム</span>徹底攻略</a>
    <nav>
      <a href="index.html">トップ</a>
      <a href="monsters.html">モンスター一覧</a>
      <a href="assist.html">アシストカード一覧</a>
    </nav>
  </div>
</header>

<main>
<div class="game-wrapper">
  <div class="game-title">🎮 モンスター<span>進化</span>2048</div>

  <!-- スタート画面 -->
  <div id="startScreen" class="start-card">
    <div class="rules">
      <strong>🎮 遊び方</strong><br>
      矢印キー（PC）またはスワイプ（スマホ）でタイルを動かそう。<br>
      同じモンスターがぶつかると<strong>進化</strong>する！<br>
      <strong>60秒間</strong>でボード上のスコアの合計を競う。<br>
      <br>
      <strong>進化順：</strong>
      <div class="evo-chain">
        <span class="evo-chip">2</span><span>→</span>
        <span class="evo-chip">モッチー</span><span>→</span>
        <span class="evo-chip">ハム</span><span>→</span>
        <span class="evo-chip">スエゾー</span><span>→</span>
        <span class="evo-chip">ディノ</span><span>→</span>
        <span class="evo-chip">ライガー</span><span>→</span>
        <span class="evo-chip">ピクシー</span><span>→</span>
        <span class="evo-chip">ニャー</span><span>→</span>
        <span class="evo-chip">ナーガ</span><span>→</span>
        <span class="evo-chip">ゴーレム</span><span>→</span>
        <span class="evo-chip">ムー</span><span>→</span>
        <span class="evo-chip">カワズモー</span>
      </div>
    </div>
    <div class="name-row">
      <input type="text" id="nameInput" class="name-input" placeholder="ニックネーム（最大12文字）" maxlength="12">
      <button class="start-btn" onclick="startGame()">スタート！</button>
    </div>
    <div class="pre-ranking" id="preRanking"></div>
  </div>

  <!-- ゲーム画面 -->
  <div id="gameScreen" style="display:none;">
    <div class="timer-bar-wrap">
      <div id="timerBar" class="timer-bar"></div>
    </div>
    <div class="game-hd">
      <div class="info-box">
        <div class="info-label">スコア</div>
        <div class="info-val" id="scoreVal">0</div>
      </div>
      <div class="info-box">
        <div class="info-label">残り時間</div>
        <div class="info-val" id="timerVal">60</div>
      </div>
    </div>
    <div class="grid-wrap" id="gridWrap">
      <div class="grid" id="gameGrid"></div>
    </div>
    <div class="how-to">PC：矢印キー　スマホ：スワイプ</div>
  </div>

  <!-- 終了画面 -->
  <div id="endScreen" class="end-card" style="display:none;">
    <div class="end-title">⏱ タイムアップ！</div>
    <div class="end-label">最終スコア</div>
    <div class="end-score" id="endScore">0</div>
    <div class="best-note" id="bestNote"></div>
    <div class="submit-msg" id="submitMsg"></div>
    <div id="rankingResult"></div>
    <button class="retry-btn" onclick="showStart()">もう一度遊ぶ</button>
  </div>
</div>
</main>

<footer style="text-align:center;padding:20px;color:#999;font-size:13px;">
  <a href="index.html" style="color:#f0a500;text-decoration:none;">← トップへ戻る</a>
</footer>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDQ7JiSAs8wozZPoh4esXnYjOPvexcMfKs",
  authDomain: "line-monster-farm.firebaseapp.com",
  projectId: "line-monster-farm",
  storageBucket: "line-monster-farm.firebasestorage.app",
  messagingSenderId: "952838892758",
  appId: "1:952838892758:web:3ef72e64bd567aefa22d77"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 進化チェーン
const EVO = {
  2:    { name: '2',         cls: 't2' },
  4:    { name: 'モッチー',   cls: 't4',   sz: '' },
  8:    { name: 'ハム',       cls: 't8',   sz: '' },
  16:   { name: 'スエゾー',   cls: 't16',  sz: '' },
  32:   { name: 'ディノ',     cls: 't32',  sz: '' },
  64:   { name: 'ライガー',   cls: 't64',  sz: '' },
  128:  { name: 'ピクシー',   cls: 't128', sz: '' },
  256:  { name: 'ニャー',     cls: 't256', sz: '' },
  512:  { name: 'ナーガ',     cls: 't512', sz: '' },
  1024: { name: 'ゴーレム',   cls: 't1024', sz: 'sm' },
  2048: { name: 'ムー',       cls: 't2048', sz: '' },
  4096: { name: 'カワズモー', cls: 't4096', sz: 'xs' },
};

let board = [];
let gameActive = false;
let timeLeft = 60;
let timerId = null;
let playerName = '';
let touchX = 0, touchY = 0;

// ===== ボード操作 =====
function newBoard() {
  board = Array.from({length:4}, () => Array(4).fill(0));
  addTile(); addTile();
}

function addTile() {
  const empty = [];
  for (let r=0;r<4;r++) for (let c=0;c<4;c++) if (!board[r][c]) empty.push([r,c]);
  if (!empty.length) return;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  board[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function calcScore() {
  let s = 0;
  board.forEach(row => row.forEach(v => s += v));
  return s;
}

function slideRow(row) {
  const a = row.filter(v => v);
  const res = [];
  let i = 0;
  while (i < a.length) {
    if (i+1 < a.length && a[i] === a[i+1]) { res.push(a[i]*2); i+=2; }
    else { res.push(a[i]); i++; }
  }
  while (res.length < 4) res.push(0);
  return res;
}

function move(dir) {
  if (!gameActive) return;
  const prev = board.map(r => [...r]);

  if (dir === 'left') {
    board = board.map(r => slideRow(r));
  } else if (dir === 'right') {
    board = board.map(r => slideRow([...r].reverse()).reverse());
  } else if (dir === 'up') {
    for (let c=0;c<4;c++) {
      const s = slideRow([board[0][c],board[1][c],board[2][c],board[3][c]]);
      s.forEach((v,r) => board[r][c]=v);
    }
  } else {
    for (let c=0;c<4;c++) {
      const s = slideRow([board[3][c],board[2][c],board[1][c],board[0][c]]);
      s.forEach((v,r) => board[3-r][c]=v);
    }
  }

  let changed = false;
  for (let r=0;r<4;r++) for (let c=0;c<4;c++) if (board[r][c]!==prev[r][c]) changed=true;
  if (changed) { addTile(); render(); }
}

// ===== 描画 =====
function render() {
  const g = document.getElementById('gameGrid');
  g.innerHTML = '';
  board.forEach(row => {
    row.forEach(v => {
      const el = document.createElement('div');
      if (!v) {
        el.className = 'cell';
      } else {
        const e = EVO[v] || { name: String(v), cls: 't4096', sz: 'xs' };
        el.className = ['tile', e.cls, e.sz || ''].join(' ').trim();
        el.textContent = e.name;
      }
      g.appendChild(el);
    });
  });
  document.getElementById('scoreVal').textContent = calcScore().toLocaleString();
}

// ===== タイマー =====
function tickTimer() {
  const bar = document.getElementById('timerBar');
  const tv = document.getElementById('timerVal');
  tv.textContent = timeLeft;
  bar.style.width = (timeLeft/60*100) + '%';
  if (timeLeft <= 10) {
    bar.style.background = '#e53935';
    tv.className = 'info-val danger';
  } else if (timeLeft <= 20) {
    bar.style.background = '#f0a500';
    tv.className = 'info-val warn';
  } else {
    bar.style.background = '#4CAF50';
    tv.className = 'info-val';
  }
}

// ===== ゲームフロー =====
function startGame() {
  const inp = document.getElementById('nameInput');
  playerName = inp.value.trim();
  if (!playerName) { inp.classList.add('err'); inp.focus(); return; }
  inp.classList.remove('err');
  localStorage.setItem('lmf2048n', playerName);

  show('gameScreen');
  newBoard();
  render();
  gameActive = true;
  timeLeft = 60;
  tickTimer();
  timerId = setInterval(() => {
    timeLeft--;
    tickTimer();
    if (timeLeft <= 0) endGame();
  }, 1000);
}

function endGame() {
  clearInterval(timerId);
  gameActive = false;
  const score = calcScore();
  document.getElementById('endScore').textContent = score.toLocaleString();

  const best = Number(localStorage.getItem('lmf2048best') || 0);
  const noteEl = document.getElementById('bestNote');
  if (score > best) {
    localStorage.setItem('lmf2048best', score);
    noteEl.textContent = '🎉 自己ベスト更新！';
  } else {
    noteEl.textContent = best ? `自己ベスト：${best.toLocaleString()}` : '';
  }

  show('endScreen');
  saveScore(playerName, score);
}

function showStart() {
  show('startScreen');
  loadPreRanking();
}

function show(id) {
  ['startScreen','gameScreen','endScreen'].forEach(s => {
    document.getElementById(s).style.display = s===id ? 'block' : 'none';
  });
}

// ===== キー操作 =====
document.addEventListener('keydown', e => {
  const m = {ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if (m[e.key]) { e.preventDefault(); move(m[e.key]); }
});

// ===== Firebase =====
async function saveScore(name, score) {
  const msg = document.getElementById('submitMsg');
  msg.textContent = 'スコアを送信中...';
  try {
    await db.collection('game2048').add({
      name, score,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    msg.textContent = 'スコアを登録しました！';
  } catch(e) {
    msg.textContent = '送信に失敗しました';
  }
  loadRanking('rankingResult', score, name);
}

async function loadRanking(containerId, myScore, myName) {
  const el = document.getElementById(containerId);
  el.innerHTML = '<div style="color:#888;font-size:13px;padding:8px 0;">読み込み中...</div>';
  try {
    const snap = await db.collection('game2048').orderBy('score','desc').limit(10).get();
    const rows = [];
    snap.forEach(d => rows.push(d.data()));
    el.innerHTML = buildRankTable(rows, myScore, myName, true);
  } catch(e) {
    el.innerHTML = '<div style="color:#888;font-size:13px;">ランキングを読み込めませんでした</div>';
  }
}

async function loadPreRanking() {
  const el = document.getElementById('preRanking');
  el.innerHTML = '';
  try {
    const snap = await db.collection('game2048').orderBy('score','desc').limit(10).get();
    if (snap.empty) return;
    const rows = [];
    snap.forEach(d => rows.push(d.data()));
    el.innerHTML = buildRankTable(rows, null, null, false);
  } catch(e) {}
}

function buildRankTable(rows, myScore, myName, showTitle) {
  const medals = ['🥇','🥈','🥉'];
  let html = showTitle ? '<div class="rank-sec-title">🏆 ランキング TOP10</div>' : '<div class="rank-sec-title">🏆 ランキング</div>';
  html += '<table class="rank-table"><thead><tr><th>順位</th><th>名前</th><th>スコア</th></tr></thead><tbody>';
  let marked = false;
  rows.forEach((d, i) => {
    const isMe = showTitle && !marked && d.name === myName && d.score === myScore;
    if (isMe) marked = true;
    html += `<tr${isMe?' class="me"':''}><td>${medals[i]||i+1}</td><td>${esc(d.name)}</td><td>${d.score.toLocaleString()}</td></tr>`;
  });
  html += '</tbody></table>';
  return html;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== 初期化 =====
window.addEventListener('load', () => {
  const saved = localStorage.getItem('lmf2048n');
  if (saved) document.getElementById('nameInput').value = saved;
  loadPreRanking();

  const gw = document.getElementById('gridWrap');
  gw.addEventListener('touchstart', e => {
    touchX = e.touches[0].clientX;
    touchY = e.touches[0].clientY;
  }, {passive:true});
  gw.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchX;
    const dy = e.changedTouches[0].clientY - touchY;
    if (Math.abs(dx) < 15 && Math.abs(dy) < 15) return;
    if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
    else move(dy > 0 ? 'down' : 'up');
  }, {passive:true});
});
</script>
</body>
</html>
