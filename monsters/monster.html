<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>モンスター詳細 | LINEモンスターファーム徹底攻略</title>
  <link rel="stylesheet" href="../style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7841397391542171" crossorigin="anonymous"></script>
  <style>
    .detail-wrap {
      max-width: 620px;
      margin: 0 auto;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #f0a500;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .back-btn:hover { text-decoration: underline; }

    /* ---- モンスターカード ---- */
    .detail-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .detail-img-wrap {
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
      position: relative;
    }
    .detail-img {
      max-width: 200px;
      width: 100%;
      height: auto;
      border-radius: 8px;
      display: block;
    }
    .detail-limited-badge {
      position: absolute;
      top: 12px; right: 12px;
      background: linear-gradient(135deg, #e11d48, #f59e0b);
      color: #fff;
      font-size: 11px;
      font-weight: bold;
      padding: 3px 8px;
      border-radius: 6px;
    }
    .detail-body { padding: 20px 24px 24px; }
    .detail-name {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .detail-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .aura-badge-lg {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      font-weight: bold;
      padding: 4px 12px;
      border-radius: 12px;
      background: #f5f5f5;
    }
    .aura-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .aura-赤 .aura-dot { background:#e53e3e; } .aura-赤 { color:#c53030; }
    .aura-青 .aura-dot { background:#3182ce; } .aura-青 { color:#2b6cb0; }
    .aura-黄 .aura-dot { background:#d69e2e; } .aura-黄 { color:#b7791f; }
    .aura-黒 .aura-dot { background:#4a4a4a; } .aura-黒 { color:#2d2d2d; }
    .aura-白 .aura-dot { background:#a0aec0; border:1px solid #ccc; } .aura-白 { color:#718096; }
    .aura-緑 .aura-dot { background:#38a169; } .aura-緑 { color:#276749; }
    .mon-badge {
      font-size: 13px;
      font-weight: bold;
      padding: 4px 12px;
      border-radius: 12px;
      background: #1a1a2e;
      color: #f0a500;
    }
    .bloodline-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .bloodline-item {
      font-size: 12px;
      color: #888;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .bloodline-label {
      color: #bbb;
      font-size: 11px;
    }
    .bloodline-value {
      font-weight: bold;
      color: #555;
    }
    .limited-badge-inline {
      font-size: 11px;
      font-weight: bold;
      padding: 4px 10px;
      border-radius: 12px;
      background: linear-gradient(135deg,#e11d48,#f59e0b);
      color: #fff;
    }

    /* ---- 共通セクション ---- */
    .section-box {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      padding: 22px 24px;
      margin-bottom: 16px;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 17px;
      font-weight: bold;
      color: #1a1a2e;
      border-left: 5px solid #f0a500;
      padding-left: 12px;
    }
    .edit-btn {
      background: none;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      color: #888;
      transition: all 0.2s;
    }
    .edit-btn:hover { border-color: #f0a500; color: #f0a500; }
    .edit-btn.active { background: #f0a500; border-color: #f0a500; color: #fff; }
    .edit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ---- 評価解説 ---- */
    .expl-body {
      font-size: 14px;
      line-height: 1.8;
      color: #333;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .expl-body.empty { color: #bbb; font-style: italic; }
    .expl-textarea {
      width: 100%;
      min-height: 120px;
      padding: 10px;
      border: 2px solid #f0a500;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.8;
      resize: vertical;
      box-sizing: border-box;
    }
    .expl-textarea:focus { outline: none; }
    .save-btn {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: #f0a500;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .save-btn:hover { background: #d4920a; }

    /* ---- おすすめ編成 ---- */
    .formation-empty { color: #bbb; font-style: italic; font-size: 14px; }
    .formation-item {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #eee;
    }
    .formation-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .formation-item-name {
      font-size: 14px;
      font-weight: bold;
      color: #444;
      margin-bottom: 10px;
    }
    .formation-row {
      display: flex;
      align-items: flex-start;
      gap: 4px;
      flex-wrap: wrap;
    }
    .formation-deck-cards { display: flex; gap: 6px; flex-wrap: wrap; }
    .f-card { text-align: center; width: 74px; }
    .f-card a { text-decoration: none; color: inherit; display: block; }
    .f-card img {
      width: 74px; height: 74px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      transition: transform 0.2s;
    }
    .f-card img:hover { transform: scale(1.05); }
    .f-card-placeholder {
      width: 74px; height: 74px;
      background: #f0f0f0;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ccc;
      font-size: 22px;
    }
    .f-card-name { font-size: 10px; color: #666; margin-top: 4px; line-height: 1.3; }
    .rental-sep {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
      align-self: center;
      gap: 3px;
    }
    .rental-sep-line {
      width: 2px; height: 36px;
      background: linear-gradient(to bottom, #f0a500, #ff6b35);
      border-radius: 2px;
    }
    .rental-sep-label {
      font-size: 9px;
      font-weight: bold;
      color: #f0a500;
      writing-mode: vertical-rl;
      letter-spacing: 1px;
    }
    /* 編成編集フォーム */
    .form-formation-item {
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .form-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .form-title-input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      font-family: inherit;
    }
    .form-title-input:focus { outline: none; border-color: #f0a500; }
    .form-remove-btn {
      padding: 4px 10px;
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      color: #999;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }
    .form-remove-btn:hover { border-color: #e74c3c; color: #e74c3c; }
    .form-cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .form-card-slot { display: flex; flex-direction: column; gap: 4px; }
    .rental-slot {
      grid-column: 1 / -1;
      background: #fff9ed;
      border: 1px dashed #f0a500;
      border-radius: 8px;
      padding: 8px;
    }
    .form-card-label { font-size: 11px; font-weight: bold; color: #888; }
    .form-card-input {
      padding: 5px 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      width: 100%;
      box-sizing: border-box;
    }
    .form-card-input:focus { outline: none; border-color: #f0a500; }
    .form-card-preview img {
      width: 48px; height: 48px;
      object-fit: cover;
      border-radius: 6px;
      margin-top: 2px;
    }
    .form-add-btn {
      display: block;
      width: 100%;
      padding: 9px;
      background: none;
      border: 2px dashed #ddd;
      border-radius: 8px;
      color: #aaa;
      font-size: 14px;
      cursor: pointer;
      margin-top: 4px;
      transition: all 0.2s;
    }
    .form-add-btn:hover { border-color: #f0a500; color: #f0a500; }

    /* ---- コメント欄 ---- */
    .comment-list { margin-bottom: 20px; }
    .comment-item {
      padding: 12px 14px;
      border-bottom: 1px solid #f0f0f0;
    }
    .comment-item:last-child { border-bottom: none; }
    .comment-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .comment-name {
      font-size: 13px;
      font-weight: bold;
      color: #1a1a2e;
    }
    .comment-date {
      font-size: 11px;
      color: #aaa;
    }
    .comment-body {
      font-size: 14px;
      line-height: 1.7;
      color: #333;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .comment-empty { color: #bbb; font-style: italic; font-size: 14px; }
    .comment-delete-btn {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: #ddd;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .comment-delete-btn:hover { color: #e53e3e; background: #fff0f0; }
    .admin-toggle-btn {
      background: none;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 11px;
      cursor: pointer;
      color: #aaa;
      transition: all 0.2s;
    }
    .admin-toggle-btn:hover { border-color: #f0a500; color: #f0a500; }
    .admin-toggle-btn.active { background: #1a1a2e; border-color: #1a1a2e; color: #f0a500; }

    /* 投稿フォーム */
    .comment-form { border-top: 2px solid #f0f0f0; padding-top: 16px; }
    .comment-form h4 { font-size: 14px; color: #555; margin-bottom: 12px; }
    .comment-input-row { margin-bottom: 10px; }
    .comment-input-row label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: #888;
      margin-bottom: 4px;
    }
    .comment-input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 7px;
      font-size: 14px;
      font-family: inherit;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .comment-input:focus { outline: none; border-color: #f0a500; }
    textarea.comment-input { min-height: 90px; resize: vertical; }
    .comment-submit-btn {
      padding: 9px 24px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .comment-submit-btn:hover { background: #f0a500; }
    .comment-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .not-found {
      text-align: center;
      padding: 60px 20px;
      color: #999;
      font-size: 16px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="../index.html">LINE<span>モンスターファーム</span>徹底攻略</a>
    <nav>
      <a href="../index.html">トップ</a>
      <a href="../monsters.html" class="active">モンスター一覧</a>
      <a href="../assist.html">アシストカード一覧</a>
    </nav>
  </div>
</header>

<div class="container">
  <div class="detail-wrap">
    <a class="back-btn" href="../monsters.html">← モンスター一覧に戻る</a>
    <div id="detail-root"></div>
  </div>
</div>

<footer>
  LINEモンスターファーム徹底攻略 &copy; 2026 ／ 非公式ファンサイト
  ／ <a href="../privacy.html" style="color:#aaa;text-decoration:none;">プライバシーポリシー</a>
</footer>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../monsters-data.js"></script>
<script src="../cards/cards-data.js"></script>

<script>
const EDIT_PASSWORD = 'mf2024';

const firebaseConfig = {
  apiKey: "AIzaSyDQ7JiSAs8wozZPoh4esXnYjOPvexcMfKs",
  authDomain: "line-monster-farm.firebaseapp.com",
  projectId: "line-monster-farm",
  storageBucket: "line-monster-farm.firebasestorage.app",
  messagingSenderId: "952838892758",
  appId: "1:952838892758:web:3ef72e64bd567aefa22d77"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// URLからインデックス取得
const params = new URLSearchParams(location.search);
const idx = parseInt(params.get('id'), 10);
const root = document.getElementById('detail-root');

let pageData = { explanation: '', formations: [] };
const docId = String(idx);

// 画像URL
function gwUrl(gwImg) {
  return `https://img.gamewith.jp/article_tools/monsterfarm-line/gacha/Lmonfar_monster_${gwImg}.png`;
}

if (isNaN(idx) || idx < 0 || idx >= monstersData.length) {
  root.innerHTML = '<div class="not-found">モンスターが見つかりませんでした。</div>';
} else {
  const m = monstersData[idx];
  const imgSrc = m.localImg ? `../monster/${m.localImg}` : gwUrl(m.gwImg);
  document.title = `${m.name} | LINEモンスターファーム徹底攻略`;

  root.innerHTML = `
    <!-- モンスター基本情報 -->
    <div class="detail-card">
      <div class="detail-img-wrap">
        <img class="detail-img" src="${imgSrc}" alt="${m.name}" onerror="this.src='${gwUrl(m.gwImg)}'">
        ${m.limited ? `<span class="detail-limited-badge">${m.limitedLabel || '限定'}</span>` : ''}
      </div>
      <div class="detail-body">
        <div class="detail-name">${m.name}</div>
        <div class="detail-badges">
          <span class="aura-badge-lg aura-${m.aura}"><span class="aura-dot"></span>${m.aura}オーラ</span>
          ${m.mon ? `<span class="mon-badge">${m.mon}</span>` : ''}
          ${m.limited ? `<span class="limited-badge-inline">${m.limitedLabel || '限定'}</span>` : ''}
        </div>
        ${(m.mainMon || m.subMon) ? `
        <div class="bloodline-row">
          ${m.mainMon ? `<div class="bloodline-item"><span class="bloodline-label">主血統</span><span class="bloodline-value">${m.mainMon}</span></div>` : ''}
          ${m.subMon ? `<div class="bloodline-item"><span class="bloodline-label">副血統</span><span class="bloodline-value">${m.subMon}</span></div>` : ''}
        </div>` : ''}
      </div>
    </div>

    <!-- 評価解説 -->
    <div class="section-box" id="expl-section">
      <div class="section-header">
        <span class="section-title">評価解説</span>
        <button class="edit-btn" id="expl-edit-btn" onclick="startExplEdit()">✏️ 編集</button>
      </div>
      <div class="expl-body empty" id="expl-body">読込中...</div>
    </div>

    <!-- おすすめ編成 -->
    <div class="section-box" id="form-section">
      <div class="section-header">
        <span class="section-title">おすすめ編成</span>
        <button class="edit-btn" id="form-edit-btn" onclick="startFormEdit()">✏️ 編集</button>
      </div>
      <div id="formation-content"><div class="formation-empty">読込中...</div></div>
    </div>

    <!-- コメント欄 -->
    <div class="section-box" id="comment-section">
      <div class="section-header">
        <span class="section-title">💬 コメント</span>
        <button class="admin-toggle-btn" id="admin-toggle-btn" onclick="toggleAdmin()">🔒 管理</button>
      </div>
      <div class="comment-list" id="comment-list">
        <div class="comment-empty">読込中...</div>
      </div>
      <div class="comment-form">
        <h4>コメントを投稿する</h4>
        <div class="comment-input-row">
          <label>名前（省略可）</label>
          <input class="comment-input" id="comment-name" type="text" placeholder="名無しトレーナー" maxlength="30">
        </div>
        <div class="comment-input-row">
          <label>コメント <span style="color:#e53e3e">*</span></label>
          <textarea class="comment-input" id="comment-body" placeholder="このモンスターについて自由にコメントしてください" maxlength="500"></textarea>
        </div>
        <button class="comment-submit-btn" id="comment-submit-btn" onclick="submitComment()">投稿する</button>
      </div>
    </div>
  `;

  // データ読み込み
  loadMonsterData();
  loadComments();
}

// =============================================
// Firestore データ読み込み
// =============================================
async function loadMonsterData() {
  try {
    const doc = await db.collection('monsters').doc(docId).get();
    if (doc.exists) {
      const d = doc.data();
      pageData.explanation = d.explanation || '';
      pageData.formations  = d.formations  || [];
    }
  } catch(e) { console.error(e); }
  renderExplanation();
  renderFormations();
}

// =============================================
// 評価解説
// =============================================
let explEditMode = false;

function renderExplanation() {
  const el = document.getElementById('expl-body');
  if (!el) return;
  if (pageData.explanation) {
    el.textContent = pageData.explanation;
    el.classList.remove('empty');
  } else {
    el.textContent = '（未設定）';
    el.classList.add('empty');
  }
}

function startExplEdit() {
  if (explEditMode) return;
  const pw = prompt('編集パスワードを入力してください');
  if (pw !== EDIT_PASSWORD) { if (pw !== null) alert('パスワードが違います'); return; }
  explEditMode = true;
  const btn = document.getElementById('expl-edit-btn');
  btn.textContent = '💾 保存';
  btn.classList.add('active');
  btn.onclick = saveExpl;
  const el = document.getElementById('expl-body');
  el.classList.remove('empty');
  el.innerHTML = `<textarea class="expl-textarea" id="expl-textarea" placeholder="評価解説を入力...">${pageData.explanation}</textarea>
    <button class="save-btn" onclick="saveExpl()">💾 保存する</button>`;
}

async function saveExpl() {
  const ta = document.getElementById('expl-textarea');
  const text = ta ? ta.value.trim() : '';
  const btn = document.getElementById('expl-edit-btn');
  btn.textContent = '保存中...';
  btn.disabled = true;
  try {
    await db.collection('monsters').doc(docId).set({ explanation: text }, { merge: true });
    pageData.explanation = text;
  } catch(e) {
    alert('保存に失敗しました: ' + e.message);
    btn.textContent = '💾 保存'; btn.disabled = false; return;
  }
  explEditMode = false;
  btn.textContent = '✏️ 編集'; btn.classList.remove('active'); btn.disabled = false;
  btn.onclick = startExplEdit;
  renderExplanation();
}

// =============================================
// おすすめ編成
// =============================================
let formEditMode = false;

// アシストカードのルックアップ
const cardLookup = {};
const cardLabelOf = {};
if (typeof cardsData !== 'undefined') {
  Object.entries(cardsData).forEach(([cid, c]) => {
    const label = `${c.name} (${c.rarity})`;
    cardLookup[label] = cid;
    cardLabelOf[cid] = label;
  });
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fCardHTML(cid) {
  if (!cid || !cardsData || !cardsData[cid]) {
    return `<div class="f-card"><div class="f-card-placeholder">？</div><div class="f-card-name">${cid ? escHtml(cid) : '未設定'}</div></div>`;
  }
  const c = cardsData[cid];
  return `<div class="f-card">
    <a href="../cards/card.html#${cid}">
      <img src="../assist-cards/${cid}.${c.ext}" alt="${escHtml(c.name)}">
    </a>
    <div class="f-card-name">${escHtml(c.name)}</div>
  </div>`;
}

function renderFormations() {
  const el = document.getElementById('formation-content');
  if (!el) return;
  const formations = pageData.formations;
  if (!formations || formations.length === 0) {
    el.innerHTML = '<div class="formation-empty">（未設定）</div>';
    return;
  }
  el.innerHTML = formations.map(f => `
    <div class="formation-item">
      <div class="formation-item-name">${escHtml(f.title || '編成')}</div>
      <div class="formation-row">
        <div class="formation-deck-cards">
          ${(f.cards || []).map(cid => fCardHTML(cid)).join('')}
        </div>
        <div class="rental-sep">
          <div class="rental-sep-line"></div>
          <div class="rental-sep-label">レンタル</div>
        </div>
        ${fCardHTML(f.rental)}
      </div>
    </div>
  `).join('');
}

function startFormEdit() {
  if (formEditMode) return;
  const pw = prompt('編集パスワードを入力してください');
  if (pw !== EDIT_PASSWORD) { if (pw !== null) alert('パスワードが違います'); return; }
  formEditMode = true;
  const btn = document.getElementById('form-edit-btn');
  btn.textContent = '💾 保存';
  btn.classList.add('active');
  btn.onclick = saveFormations;
  renderFormEdit(pageData.formations);
}

function renderFormEdit(formations) {
  if (!formations || formations.length === 0) formations = [{ title: 'おすすめ編成①', cards: ['','','','',''], rental: '' }];
  const el = document.getElementById('formation-content');
  const datalistOpts = Object.keys(cardLookup).map(l => `<option value="${escHtml(l)}">`).join('');

  const itemsHTML = formations.map((f, fi) => {
    const cardsInputs = [0,1,2,3,4].map(ci => {
      const val = (f.cards && f.cards[ci]) ? (cardLabelOf[f.cards[ci]] || f.cards[ci]) : '';
      const prev = (f.cards && f.cards[ci] && cardsData && cardsData[f.cards[ci]])
        ? `<img src="../assist-cards/${f.cards[ci]}.${cardsData[f.cards[ci]].ext}">` : '';
      return `<div class="form-card-slot">
        <div class="form-card-label">カード${ci+1}</div>
        <input class="form-card-input" id="fc-${fi}-${ci}" list="card-dl" placeholder="カード名" value="${escHtml(val)}"
          oninput="prevCard('fc-${fi}-${ci}','fp-${fi}-${ci}')">
        <div class="form-card-preview" id="fp-${fi}-${ci}">${prev}</div>
      </div>`;
    }).join('');

    const rval = f.rental ? (cardLabelOf[f.rental] || f.rental) : '';
    const rprev = (f.rental && cardsData && cardsData[f.rental])
      ? `<img src="../assist-cards/${f.rental}.${cardsData[f.rental].ext}">` : '';

    return `<div class="form-formation-item" id="form-item-${fi}">
      <div class="form-row">
        <input class="form-title-input" id="form-title-${fi}" placeholder="編成名" value="${escHtml(f.title||'')}">
        <button class="form-remove-btn" onclick="removeFormItem(${fi})">× 削除</button>
      </div>
      <div class="form-cards-grid">
        ${cardsInputs}
        <div class="form-card-slot rental-slot">
          <div class="form-card-label">🔶 レンタル</div>
          <input class="form-card-input" id="fr-${fi}" list="card-dl" placeholder="カード名" value="${escHtml(rval)}"
            oninput="prevCard('fr-${fi}','frp-${fi}')">
          <div class="form-card-preview" id="frp-${fi}">${rprev}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = `<datalist id="card-dl">${datalistOpts}</datalist>
    ${itemsHTML}
    <button class="form-add-btn" onclick="addFormItem()">＋ 編成を追加</button>`;
}

function prevCard(inputId, previewId) {
  const input = document.getElementById(inputId);
  const preview = document.getElementById(previewId);
  if (!input || !preview) return;
  const cid = cardLookup[input.value.trim()];
  if (cid && cardsData && cardsData[cid]) {
    preview.innerHTML = `<img src="../assist-cards/${cid}.${cardsData[cid].ext}">`;
  } else {
    preview.innerHTML = '';
  }
}

function collectFormData() {
  const result = [];
  let fi = 0;
  while (document.getElementById('form-item-' + fi)) {
    const title = document.getElementById('form-title-' + fi)?.value.trim() || '';
    const cards = [0,1,2,3,4].map(ci => {
      const v = document.getElementById(`fc-${fi}-${ci}`)?.value.trim() || '';
      return cardLookup[v] || '';
    });
    const rv = document.getElementById('fr-' + fi)?.value.trim() || '';
    result.push({ title, cards, rental: cardLookup[rv] || '' });
    fi++;
  }
  return result;
}

function addFormItem() {
  const cur = collectFormData();
  cur.push({ title: `おすすめ編成${cur.length+1}`, cards: ['','','','',''], rental: '' });
  renderFormEdit(cur);
}

function removeFormItem(fi) {
  const cur = collectFormData();
  cur.splice(fi, 1);
  renderFormEdit(cur);
}

async function saveFormations() {
  const data = collectFormData();
  const btn = document.getElementById('form-edit-btn');
  btn.textContent = '保存中...'; btn.disabled = true;
  try {
    await db.collection('monsters').doc(docId).set({ formations: data }, { merge: true });
    pageData.formations = data;
  } catch(e) {
    alert('保存に失敗しました: ' + e.message);
    btn.textContent = '💾 保存'; btn.disabled = false; return;
  }
  formEditMode = false;
  btn.textContent = '✏️ 編集'; btn.classList.remove('active'); btn.disabled = false;
  btn.onclick = startFormEdit;
  renderFormations();
}

// =============================================
// コメント欄
// =============================================
let adminMode = false;

function toggleAdmin() {
  if (adminMode) {
    adminMode = false;
    const btn = document.getElementById('admin-toggle-btn');
    if (btn) { btn.textContent = '🔒 管理'; btn.classList.remove('active'); }
    loadComments();
    return;
  }
  const pw = prompt('管理者パスワードを入力してください');
  if (pw !== EDIT_PASSWORD) { if (pw !== null) alert('パスワードが違います'); return; }
  adminMode = true;
  const btn = document.getElementById('admin-toggle-btn');
  if (btn) { btn.textContent = '🔓 管理中'; btn.classList.add('active'); }
  loadComments();
}

async function deleteComment(commentDocId) {
  if (!confirm('このコメントを削除しますか？')) return;
  try {
    await db.collection('monsters').doc(docId).collection('comments').doc(commentDocId).delete();
    await loadComments();
  } catch(e) {
    alert('削除に失敗しました: ' + e.message);
  }
}

async function loadComments() {
  const listEl = document.getElementById('comment-list');
  if (!listEl) return;
  try {
    const snap = await db.collection('monsters').doc(docId)
      .collection('comments').orderBy('createdAt', 'asc').get();
    if (snap.empty) {
      listEl.innerHTML = '<div class="comment-empty">まだコメントがありません。最初のコメントを投稿してみましょう！</div>';
      return;
    }
    listEl.innerHTML = snap.docs.map(d => {
      const c = d.data();
      const name = c.name ? escHtml(c.name) : '名無しトレーナー';
      const date = c.createdAt ? new Date(c.createdAt.toDate()).toLocaleDateString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }) : '';
      return `<div class="comment-item">
        <div class="comment-meta">
          <span class="comment-name">👤 ${name}</span>
          <span class="comment-date">${date}</span>
          ${adminMode ? `<button class="comment-delete-btn" onclick="deleteComment('${d.id}')">🗑️</button>` : ''}
        </div>
        <div class="comment-body">${escHtml(c.body)}</div>
      </div>`;
    }).join('');
  } catch(e) {
    listEl.innerHTML = '<div class="comment-empty">コメントの読み込みに失敗しました。</div>';
  }
}

async function submitComment() {
  const nameEl = document.getElementById('comment-name');
  const bodyEl = document.getElementById('comment-body');
  const btn = document.getElementById('comment-submit-btn');
  const body = bodyEl.value.trim();
  if (!body) { alert('コメントを入力してください'); return; }
  if (body.length > 500) { alert('コメントは500文字以内で入力してください'); return; }

  btn.disabled = true;
  btn.textContent = '投稿中...';
  try {
    await db.collection('monsters').doc(docId).collection('comments').add({
      name: nameEl.value.trim() || '',
      body: body,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    nameEl.value = '';
    bodyEl.value = '';
    await loadComments();
  } catch(e) {
    alert('投稿に失敗しました: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = '投稿する';
}
</script>
